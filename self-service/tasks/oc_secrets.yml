---
- name: Fail if client_secret is still encrypted placeholder
  ansible.builtin.fail:
    msg: |
      OAuth client_secret came back as "$encrypted$" from AAP.

      That means the application already existed and AAP will not return the real secret again.
      Re-run with recreate_oauth_app=true so a new application is created and secrets are refreshed:

        ansible-playbook deploy-aap-selfservice.yml -e @var_files/<env>-portal.yml \
          -e recreate_oauth_app=true --tags aap_setup,create_oauth,create_token,create_secrets,update_oauth
  when: app_result.client_secret | default('') == '$encrypted$'
  tags: [create_oauth, create_secrets]

- name: Normalize AAP connection variables
  ansible.builtin.import_tasks: prep.yml
  when: aap_host_url is not defined

- name: "Create secret: secrets-rhaap-portal"
  redhat.openshift.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: secrets-rhaap-portal
        namespace: "{{ openshift_namespace }}"
      type: Opaque
      data:
        aap-host-url: "{{ aap_host_url | b64encode }}"
        aap-token: "{{ aap_token_result.ansible_facts.aap_token.token | b64encode }}"
        oauth-client-id: "{{ app_result.client_id | b64encode }}"
        oauth-client-secret: "{{ app_result.client_secret | b64encode }}"
  tags: [create_secrets, create_rhaap_secret]
- name: Normalize tokens
  ansible.builtin.set_fact:
    _gitlab_token: "{{ gitlab_token | default('', true) }}"
    _github_token: "{{ github_token | default('', true) }}"

- name: Build secrets-scm data
  ansible.builtin.set_fact:
    scm_secret_data: >-
      {{
        dict(
          [('gitlab-token', _gitlab_token)] if _gitlab_token != '' else []
          +
          [('github-token', _github_token)] if _github_token != '' else []
        )
      }}


- name: "Create secret: secrets-scm"
  when: scm_secret_data | length > 0
  redhat.openshift.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: secrets-scm
        namespace: "{{ openshift_namespace }}"
      type: Opaque
      stringData: "{{ scm_secret_data }}"

- name: Create storage secrets and helm overlay
  ansible.builtin.import_tasks: create_storage_secrets.yml
