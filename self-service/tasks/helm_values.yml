- name: Get OpenShift base domain from default IngressController
  redhat.openshift.k8s:
    api_version: operator.openshift.io/v1
    kind: IngressController
    name: default
    namespace: openshift-ingress-operator
    state: present
  register: ingress_info

- name: Set base domain fact
  ansible.builtin.set_fact:
    openshift_base_domain: "{{ ingress_info.result.status.domain }}"

- name: Fail if base domain is not defined
  ansible.builtin.fail:
    msg: "openshift_base_domain is not set. Check the IngressController or cluster access."
  when: ingress_info.result.status.domain is not defined

- name: Set base domain fact
  ansible.builtin.set_fact:
    openshift_base_domain: "{{ ingress_info.result.status.domain }}"

- name: Add Openshift repository
  kubernetes.core.helm_repository:
    name: openshift
    repo_url: "{{ helm_repo_url }}"

- name: Build helm values file list
  ansible.builtin.set_fact:
    _helm_values_files: >-
      {{
        [helm_values]
        + (
          [helm_storage_values_path]
          if (external_postgresql_enabled | bool or s3_storage_enabled | bool)
          else []
        )
      }}
  tags: helm

- name: Install RHAAP chart from openshift repo
  kubernetes.core.helm:
    name: "{{ helm_release_name }}"
    release_name: "{{ helm_release_name }}"
    chart_ref: "{{ helm_repo_name }}/{{ helm_chart_name }}"
    chart_version: "{{ helm_chart_version }}"
    release_namespace: "{{ openshift_namespace }}"
    values_files: "{{ _helm_values_files }}"
    release_state: present
    set_values:
      - value: redhat-developer-hub.global.clusterRouterBase={{ openshift_base_domain }}
        value_type: string
      # JSON booleans keep checkSSL typed correctly. value_type:string turns
      # false into "False", which Node treats as truthy and breaks OAuth token exchange.
      - value: redhat-developer-hub.upstream.backstage.appConfig.auth.providers.rhaap.production.checkSSL={{ aap_verify_ssl | bool | lower }}
        value_type: json
      - value: redhat-developer-hub.upstream.backstage.appConfig.ansible.rhaap.checkSSL={{ aap_verify_ssl | bool | lower }}
        value_type: json
  tags: helm

- name: Wait for portal Helm deployment to be ready
  tags: helm
  block:
    - name: Wait for portal Deployment to become available
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ openshift_namespace }}"
        label_selectors:
          - "app.kubernetes.io/instance={{ helm_release_name }}"
        wait: true
        wait_timeout: "{{ helm_deploy_wait_timeout }}"
        wait_sleep: 10
  rescue:
    - name: Collect portal pod status after Helm wait timeout
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ openshift_namespace }}"
        label_selectors:
          - "app.kubernetes.io/instance={{ helm_release_name }}"
      register: preflight_portal_pods_after_timeout

    - name: Fail with portal pod diagnostics
      ansible.builtin.fail:
        msg: |
          Portal Deployment did not become ready within {{ helm_deploy_wait_timeout }} seconds.

          Check pod status and init container logs:
            oc get pods -n {{ openshift_namespace }} -l app.kubernetes.io/instance={{ helm_release_name }}
            oc logs -n {{ openshift_namespace }} -l app.kubernetes.io/instance={{ helm_release_name }} -c install-dynamic-plugins --tail=50
            oc describe pod -n {{ openshift_namespace }} -l app.kubernetes.io/instance={{ helm_release_name }}

          Common causes:
            - Helm chart version mismatch with plugin bundle (npm 404 in init container)
            - Node DiskPressure / insufficient ephemeral storage
            - First-time image pull for registry.redhat.io/rhdh/rhdh-hub-rhel9 (large image)

          Helm may have upgraded successfully; re-run with --tags helm once issues are resolved,
          or increase helm_deploy_wait_timeout in your vars file.
