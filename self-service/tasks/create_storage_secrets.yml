---
- name: Create external PostgreSQL credentials secret
  redhat.openshift.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ external_postgresql_secret_name }}"
        namespace: "{{ openshift_namespace }}"
      type: Opaque
      stringData:
        POSTGRES_HOST: "{{ external_postgresql_host }}"
        POSTGRES_PORT: "{{ external_postgresql_port | string }}"
        POSTGRES_USER: "{{ external_postgresql_user }}"
        POSTGRES_PASSWORD: "{{ external_postgresql_password }}"
        POSTGRES_DB: "{{ external_postgresql_database }}"
        postgres-password: "{{ external_postgresql_password }}"
  when: external_postgresql_enabled | bool
  tags: [create_secrets, create_storage_secrets, helm]

- name: Derive S3 bucket host from endpoint when not set
  ansible.builtin.set_fact:
    _s3_bucket_host: >-
      {{
        s3_host
        if (s3_host | default('') != '')
        else (
          s3_endpoint
          | regex_replace('^https?://', '')
          | regex_replace('/.*$', '')
        )
      }}
  when:
    - s3_storage_enabled | bool
    - not (s3_use_existing_secret | bool)
  tags: [create_secrets, create_storage_secrets, helm]

- name: Create S3 storage credentials secret
  redhat.openshift.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ s3_secret_name }}"
        namespace: "{{ openshift_namespace }}"
      type: Opaque
      stringData:
        AWS_ACCESS_KEY_ID: "{{ s3_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ s3_secret_access_key }}"
        BUCKET_NAME: "{{ s3_bucket_name }}"
        BUCKET_REGION: "{{ s3_region }}"
        BUCKET_HOST: "{{ _s3_bucket_host }}"
  when:
    - s3_storage_enabled | bool
    - not (s3_use_existing_secret | bool)
  tags: [create_secrets, create_storage_secrets, helm]

- name: Ensure helm overlay output directory exists
  ansible.builtin.file:
    path: "{{ helm_storage_values_path | dirname }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  run_once: true
  when: external_postgresql_enabled | bool or s3_storage_enabled | bool
  tags: [helm, generate_helm_values]

- name: Render storage helm values overlay
  ansible.builtin.template:
    src: helm-values-storage.yml.j2
    dest: "{{ helm_storage_values_path }}"
    mode: "0640"
  delegate_to: localhost
  run_once: true
  when: external_postgresql_enabled | bool or s3_storage_enabled | bool
  tags: [helm, generate_helm_values]
